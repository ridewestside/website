baseURL = 'https://beta.ridewestside.org/'
languageCode = 'en-us'
title = 'Ride Westside'
theme = 'linkpage'

[params]
  description = "Building community through cycling"
  author = "Ride Westside"

  # Social media links
  [params.social]
    instagram = "https://instagram.com/ride_westside"
    facebook = "https://www.facebook.com/profile.php?id=100094262499529"
    bluesky = "https://bsky.app/profile/ridewestside.bsky.social"
    ridewithgps = "https://ridewithgps.com/organizations/14703-ride-westside/home"
    github = "https://github.com/ridewestside/website"

[mediaTypes]
  [mediaTypes."text/calendar"]
    suffixes = ["ics"]

[outputFormats]
  [outputFormats.Calendar]
    mediaType = "text/calendar"
    baseName = "calendar"
    isPlainText = true

[outputs]
  home = ["HTML", "Calendar"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
